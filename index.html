<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <header>
        <div class="container">
            <h1>Calculator</h1>
        </div>
    </header>

    <div class="container">
        <main>
            <div class="calculator-shell">
                <div class="display"></div>

                <div class="keypad">
                    <div class="controls">
                        <button class="control">AC</button>
                        <button class="control">C</button>
                        <button class="control">⌫</button>
                    </div>

                    <div class="operators">
                        <button class="control">+</button>
                        <button class="control">-</button>
                        <button class="control">*</button>
                        <button class="control">/</button>
                        <button class="control">=</button>
                    </div>

                    <div class="numpad">
                        <button class="control">1</button>
                        <button class="control">2</button>
                        <button class="control">3</button>
                        <button class="control">4</button>
                        <button class="control">5</button>
                        <button class="control">6</button>
                        <button class="control">7</button>
                        <button class="control">8</button>
                        <button class="control">9</button>
                        <button class="control">0</button>
                        <button class="control">.</button>  
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <div class="container">
            <p>&copy; Riman Das 2024</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
