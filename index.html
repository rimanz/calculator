<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">    
    <title>Calculator</title>
</head>
<body>
    <header>
        <h1>Calculator</h1>
    </header>

    <main>
        <div class="calculator-shell">
            <div class="display">0</div>

            <div class="keypad">
                <!-- First two control buttons -->
                <button class="control">C</button>
                <button class="control">⌫</button>

                <!-- Operators and operands -->
                <button class="operator">%</button>
                <button class="operator">/</button>

                <button class="operand">1</button>
                <button class="operand">2</button>
                <button class="operand">3</button>
                <button class="operator">*</button>

                <button class="operand">4</button>
                <button class="operand">5</button>
                <button class="operand">6</button>
                <button class="operator">-</button>

                <button class="operand">7</button>
                <button class="operand">8</button>
                <button class="operand">9</button>
                <button class="operator">+</button>

                <button class="operand large">0</button>
                <button class="dot">.</button>
                <button class="result">=</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <small>&copy; Riman Das 2024</small>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
